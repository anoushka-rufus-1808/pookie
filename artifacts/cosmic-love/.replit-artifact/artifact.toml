kind = "web"
previewPath = "/"
title = "Cosmic Love Letter"
version = "1.0.0"
id = "artifacts/cosmic-love"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19588

[services.development]
run = "pnpm --filter @workspace/cosmic-love run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cosmic-love", "run", "build" ]
publicDir = "artifacts/cosmic-love/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19588"
BASE_PATH = "/"
